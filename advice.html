<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fiscal Advisor | Strategic Insights</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #020617; --glass: rgba(15, 23, 42, 0.9); 
            --neon-blue: #38bdf8; --neon-pink: #f472b6; --neon-green: #10b981;
            --border: rgba(255, 255, 255, 0.1);
        }
        body { 
            font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: #f1f5f9; 
            margin: 0; padding: 40px; background-image: radial-gradient(circle at 0% 0%, #1e1b4b 0%, #020617 100%);
        }
        .container { max-width: 1000px; margin: 0 auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px; }
        .back-btn { color: var(--neon-blue); text-decoration: none; font-weight: 700; font-size: 0.9rem; border: 1px solid var(--neon-blue); padding: 10px 20px; border-radius: 12px; transition: 0.3s; }
        .back-btn:hover { background: var(--neon-blue); color: #000; }

        .advice-stack { display: grid; gap: 20px; }
        .advice-card { 
            background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--border);
            border-radius: 24px; padding: 30px; display: grid; grid-template-columns: 80px 1fr 150px;
            align-items: center; transition: 0.3s;
        }
        .advice-card:hover { border-color: var(--neon-blue); transform: scale(1.02); }
        
        .icon-box { font-size: 2.5rem; }
        .content h3 { margin: 0 0 8px; color: var(--neon-blue); }
        .content p { margin: 0; color: #94a3b8; font-size: 0.95rem; line-height: 1.5; }
        
        .risk-tag { 
            text-align: center; padding: 8px; border-radius: 10px; font-size: 0.7rem; 
            font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
        }
        .high { background: rgba(244,114,182,0.1); color: var(--neon-pink); border: 1px solid var(--neon-pink); }
        .medium { background: rgba(168,85,247,0.1); color: #a855f7; border: 1px solid #a855f7; }
        .low { background: rgba(16,185,129,0.1); color: var(--neon-green); border: 1px solid var(--neon-green); }

        .insight-summary { 
            background: linear-gradient(90deg, #38bdf820, #a855f720); 
            padding: 30px; border-radius: 24px; margin-bottom: 40px; border: 1px solid var(--border);
            display: flex; justify-content: space-around; text-align: center;
        }
        .stat-box span { display: block; color: #64748b; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 5px; }
        .stat-box strong { font-size: 1.5rem; color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1 style="margin:0; font-size: 2.5rem; letter-spacing: -1.5px;">Fiscal Strategy</h1>
            <p style="color:#64748b; margin-top:5px;">Algorithmic Wealth Management Advice</p>
        </div>
        <a href="#" onclick="window.history.back()" class="back-btn">← DASHBOARD</a>
    </header>

    <div class="insight-summary" id="ai-overview">
        <div class="stat-box"><span>Top Leakage</span><strong id="top-cat">Analyzing...</strong></div>
        <div class="stat-box"><span>Efficiency Score</span><strong id="efficiency">--</strong></div>
        <div class="stat-box"><span>Recommended Save</span><strong id="save-target">$0.00</strong></div>
    </div>

    <div class="advice-stack" id="advice-list">
        </div>
</div>

<script>
    const db = JSON.parse(localStorage.getItem('apex_v9')) || [];
    
    function generateAdvice() {
        const list = document.getElementById('advice-list');
        const stats = { Essentials: 0, Overhead: 0, Dining: 0, Lifestyle: 0, Other: 0 };
        let total = 0;

        db.forEach(item => {
            total += item.amount;
            stats[item.category] = (stats[item.category] || 0) + item.amount;
        });

        const sorted = Object.entries(stats).sort((a,b) => b[1] - a[1]);
        const topCategory = sorted[0][0];
        
        // Update Overview
        document.getElementById('top-cat').innerText = topCategory;
        document.getElementById('save-target').innerText = `$${(total * 0.15).toFixed(2)}`;
        document.getElementById('efficiency').innerText = total > 0 ? "84%" : "N/A";

        const adviceLibrary = [
            {
                trigger: 'Dining',
                icon: '🍕',
                title: 'Hospitality Threshold Breached',
                text: 'Your hospitality spending is your largest variable cost. Reducing dining out by just 20% would shift funds to your savings node.',
                risk: 'high'
            },
            {
                trigger: 'Overhead',
                icon: '⚡',
                title: 'Fixed Cost Optimization',
                text: 'Recurring utility bills detected. Consider an audit of subscription services or checking for lower energy provider rates.',
                risk: 'medium'
            },
            {
                trigger: 'Essentials',
                icon: '🛒',
                title: 'Bulk Acquisition Strategy',
                text: 'High frequency of grocery scans. Moving to a weekly bulk purchase model could reduce "impulse tax" at checkout.',
                risk: 'low'
            },
            {
                trigger: 'Lifestyle',
                icon: '👕',
                title: 'Apparel Depreciation',
                text: 'Retail fashion spending detected. Try the "48-hour rule"—wait two days before finalizing any luxury purchase.',
                risk: 'medium'
            },
            {
                trigger: 'always',
                icon: '🛡️',
                title: 'Emergency Buffer Protocol',
                text: 'Maintain 3x your average weekly spending in a high-liquidity account to prevent credit dependency.',
                risk: 'low'
            }
        ];

        adviceLibrary.forEach(item => {
            if (item.trigger === 'always' || stats[item.trigger] > 0) {
                list.insertAdjacentHTML('beforeend', `
                    <div class="advice-card">
                        <div class="icon-box">${item.icon}</div>
                        <div class="content">
                            <h3>${item.title}</h3>
                            <p>${item.text}</p>
                        </div>
                        <div class="risk-tag ${item.risk}">${item.risk} priority</div>
                    </div>
                `);
            }
        });
    }

    generateAdvice();
</script>
</body>
</html>
